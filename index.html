<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Don Bosco Theater Booking</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #ff9a9e, #fad0c4);
  color: #ff4d88;
  text-align: center;
  margin: 0;
}

.container {
  padding: 20px;
}

.hidden {
  display: none;
}

h1 {
  margin-top: 10px;
}

.nav-buttons {
  display: flex;
  justify-content: space-between;
  margin: 20px 40px;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background-color: #ff4d88;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background-color: #e6005c;
}

.exit {
  background-color: #b3003c;
}

input, select {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ff4d88;
  color: #ff4d88;
}

.seats {
  display: grid;
  grid-template-columns: repeat(4, 60px);
  justify-content: center;
  gap: 10px;
  margin-top: 20px;
}

.seats button {
  width: 60px;
  height: 60px;
  background-color: #ffb6c1;
  color: #fff;
}

.seats button.selected {
  background-color: #ff4d88;
}

.seats button.occupied {
  background-color: #555;
  cursor: not-allowed;
}

.cute-img {
  width: 80px;
  margin: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1> Don Bosco Theatre</h1>
<img class="cute-img" src="https://cdn-icons-png.flaticon.com/512/869/869636.png">

<!-- STEP 1 -->
<div id="step1">
  <h2>Enter Your Name</h2>
  <input type="text" id="name" placeholder="Your Name">
  <div class="nav-buttons">
    <div></div>
    <button onclick="nextStep(2)">Next ➡</button>
  </div>
</div>

<!-- STEP 2 -->
<div id="step2" class="hidden">
  <h2>Select Tickets </h2>
  <p>Adult: $10 | Child: $6</p>
  Adults: <input type="number" id="adults" min="0" value="0"><br>
  Children: <input type="number" id="children" min="0" value="0"><br>

  <div class="nav-buttons">
    <button onclick="prevStep(1)">⬅ Back</button>
    <button onclick="nextStep(3)">Next ➡</button>
  </div>
</div>

<!-- STEP 3 -->
<div id="step3" class="hidden">
  <h2>Pick Your Pizza </h2>
  <p>All pies: $8</p>
  <select id="pie">
    <option>Cheese</option>
    <option>Pepperoni</option>
    <option>Veggie</option>
    <option>Meat Lovers</option>
  </select>

  <div class="nav-buttons">
    <button onclick="prevStep(2)">⬅ Back</button>
    <button onclick="nextStep(4)">Next ➡</button>
  </div>
</div>

<!-- STEP 4 -->
<div id="step4" class="hidden">
  <h2>Select Your Seat </h2>
  <img class="cute-img" src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
  <div class="seats" id="seats"></div>

  <div class="nav-buttons">
    <button onclick="prevStep(3)">⬅ Back</button>
    <button onclick="confirmBooking()">Confirm </button>
  </div>
</div>

<!-- STEP 5 -->
<div id="step5" class="hidden">
  <h2> Booking Confirmed!</h2>
  <img class="cute-img" src="https://cdn-icons-png.flaticon.com/512/2583/2583344.png">
  <p id="summary"></p>

  <button onclick="restart()">Book Again</button>
</div>

<br>
<button class="exit" onclick="exitApp()">Exit</button>

</div>

<script>
let selectedSeat = null;

// PRICES
const ADULT_PRICE = 10;
const CHILD_PRICE = 6;
const PIE_PRICE = 8;

// LOAD OCCUPIED SEATS
let occupiedSeats = JSON.parse(localStorage.getItem("occupiedSeats")) || [];

// CREATE SEATS
const seatsDiv = document.getElementById("seats");

for (let i = 1; i <= 12; i++) {
  let btn = document.createElement("button");
  btn.innerText = i;

  if (occupiedSeats.includes(i)) {
    btn.classList.add("occupied");
  }

  btn.onclick = function () {
    if (btn.classList.contains("occupied")) return;

    document.querySelectorAll(".seats button").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    selectedSeat = i;
  };

  seatsDiv.appendChild(btn);
}

// NAVIGATION
function nextStep(step) {
  document.querySelectorAll(".container > div").forEach(div => div.classList.add("hidden"));
  document.getElementById("step" + step).classList.remove("hidden");
}

function prevStep(step) {
  nextStep(step);
}

// CONFIRM BOOKING
function confirmBooking() {
  const name = document.getElementById("name").value;
  const adults = parseInt(document.getElementById("adults").value) || 0;
  const children = parseInt(document.getElementById("children").value) || 0;
  const pie = document.getElementById("pie").value;

  if (!name || selectedSeat === null) {
    alert("Please complete all steps!");
    return;
  }

  // CALCULATE TOTAL
  const total =
    (adults * ADULT_PRICE) +
    (children * CHILD_PRICE) +
    PIE_PRICE;

  // SAVE OCCUPIED SEAT
  occupiedSeats.push(selectedSeat);
  localStorage.setItem("occupiedSeats", JSON.stringify(occupiedSeats));

  document.getElementById("summary").innerHTML =
    `Name: ${name}<br>
     Adults: ${adults} ($${adults * ADULT_PRICE})<br>
     Children: ${children} ($${children * CHILD_PRICE})<br>
     Pie: ${pie} ($${PIE_PRICE})<br>
     Seat: ${selectedSeat}<br><br>
     <strong>Total: $${total}</strong>`;

  nextStep(5);
}

// RESET
function restart() {
  location.reload();
}

// EXIT
function exitApp() {
  document.body.innerHTML = "<h1> Thank you! See you next time.</h1>";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MVP App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="w-full max-w-md bg-white p-6 rounded-lg shadow">

  <!-- LOGIN FORM -->
  <div id="login-section">
    <h2 class="text-2xl font-bold mb-4 text-center">Login</h2>

    <input id="email" type="email" placeholder="Email"
      class="w-full mb-3 p-2 border rounded"/>

    <input id="password" type="password" placeholder="Password"
      class="w-full mb-3 p-2 border rounded"/>

    <button onclick="login()"
      class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">
      Login
    </button>

    <button onclick="register()"
      class="w-full mt-2 bg-green-500 text-white p-2 rounded hover:bg-green-600">
      Register
    </button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden">
    <h2 class="text-2xl font-bold mb-4">Dashboard</h2>

    <p class="mb-4">Welcome! 🎉</p>

    <ul id="data-list" class="mb-4"></ul>

    <button onclick="logout()"
      class="w-full bg-red-500 text-white p-2 rounded hover:bg-red-600">
      Logout
    </button>
  </div>

</div>

<script>
  // MOCK DATA (for now)
  const mockData = [
    "Task 1",
    "Task 2",
    "Task 3"
  ];

  function showDashboard() {
    document.getElementById("login-section").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");

    const list = document.getElementById("data-list");
    list.innerHTML = "";

    mockData.forEach(item => {
      const li = document.createElement("li");
      li.textContent = item;
      list.appendChild(li);
    });

    console.log("Loaded mock data (replace with Firestore later)");
  }

  function login() {
    const email = document.getElementById("email").value;
    console.log("Login with:", email);

    // TODO: Replace with Firebase Auth
    showDashboard();
  }

  function register() {
    const email = document.getElementById("email").value;
    console.log("Register with:", email);

    // TODO: Replace with Firebase Auth
    showDashboard();
  }

  function logout() {
    console.log("User logged out");

    document.getElementById("dashboard").classList.add("hidden");
    document.getElementById("login-section").classList.remove("hidden");
  }
</script>

</body>
</html>
